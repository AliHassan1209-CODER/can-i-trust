# ── Global Nginx settings ───────────────────────────────────────
user nginx;
worker_processes auto;          # one per CPU core
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format with timing
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Security headers (applied globally)
    add_header X-Frame-Options        SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff    always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Hide nginx version
    server_tokens off;

    # File upload size (for image analysis)
    client_max_body_size 15M;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr zone=api_general:10m rate=30r/m;
    limit_req_zone  $binary_remote_addr zone=api_analyze:10m rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=api_auth:10m    rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml application/xml
                    application/xml+rss text/javascript image/svg+xml;

    include /etc/nginx/conf.d/*.conf;
}
