# ╔══════════════════════════════════════════════════════════════╗
# ║  Nginx Reverse Proxy — Can I Trust?                          ║
# ║                                                              ║
# ║  HTTP  → redirects to HTTPS                                  ║
# ║  HTTPS → serves frontend, proxies /api to backend            ║
# ╚══════════════════════════════════════════════════════════════╝

# Upstream definitions (service names from docker-compose)
upstream api_backend {
    server api:8000;
    keepalive 32;
}

upstream frontend_app {
    server frontend:3000;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ───────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ───────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;           # Replace with your domain in production

    # ── SSL Certificates ────────────────────────────────────────
    # For production: use certbot / Let's Encrypt
    # For local dev:  use self-signed (generated by setup.sh)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Modern SSL config (TLS 1.2+)
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;

    # HSTS (1 year — add to preload list for production)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Connection limits
    

    # ── API Routes → FastAPI ─────────────────────────────────────
    location /api/ {
        # Rate limits (different zones per endpoint sensitivity)
        

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      4 16k;
    }

    # Stricter rate limit for analysis (ML inference is expensive)
    location /api/v1/analyze/ {
        

        proxy_pass            http://api_backend;
        proxy_http_version    1.1;
        proxy_set_header      Connection        "";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;        # ML inference can take time
    }

    # Stricter rate limit for auth (brute-force protection)
    location /api/v1/auth/ {
        

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API docs (swagger) — block in production if desired
    location /docs {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
    }

    # Health check endpoint — no auth, no rate limit
    location /health {
        proxy_pass http://api_backend;
        access_log off;
    }

    # ── Frontend SPA → React ─────────────────────────────────────
    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";    # WebSocket for HMR
        proxy_set_header   Host       $host;

        # Cache static assets at the proxy level
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass http://frontend_app;
            expires    1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # Custom error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
