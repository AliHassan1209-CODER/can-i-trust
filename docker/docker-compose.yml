# ╔══════════════════════════════════════════════════════════════╗
# ║         Can I Trust? — Production Docker Compose             ║
# ║                                                              ║
# ║  Services:                                                   ║
# ║    postgres  → Database (port 5432)                          ║
# ║    redis     → Cache   (port 6379)                           ║
# ║    api       → FastAPI backend (port 8000)                   ║
# ║    frontend  → React + Nginx (port 3000)                     ║
# ║    nginx     → Reverse proxy   (port 80 / 443)               ║
# ║                                                              ║
# ║  Usage:                                                      ║
# ║    cp .env.example .env   # fill in secrets                  ║
# ║    docker-compose up -d   # start everything                 ║
# ║    docker-compose logs -f # watch logs                       ║
# ╚══════════════════════════════════════════════════════════════╝

version: "3.9"

# ── Named volumes ──────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  ml_models:
  uploads:
  logs:

# ── Custom network (containers talk by service name) ───────────
networks:
  can_i_trust_net:
    driver: bridge

services:

  # ────────────────────────────────────────────────────────────
  # PostgreSQL — primary database
  # ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cit_postgres
    restart: unless-stopped
    networks: [can_i_trust_net]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Ali123456}
      POSTGRES_DB:       ${POSTGRES_DB:-can_i_trust}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"    # expose for local dev; remove in prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-can_i_trust}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 20s
    # Resource limits
    deploy:
      resources:
        limits:   { memory: 512m }
        reservations: { memory: 256m }

  # ────────────────────────────────────────────────────────────
  # Redis — caching layer (news API, sessions)
  # ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cit_redis
    restart: unless-stopped
    networks: [can_i_trust_net]
    volumes:
      - redis_data:/data
      - ./scripts/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  3s
      retries:  5
    deploy:
      resources:
        limits:   { memory: 256m }
        reservations: { memory: 64m }

  # ────────────────────────────────────────────────────────────
  # FastAPI Backend
  # ────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     production
    image: can_i_trust_api:latest
    container_name: cit_api
    restart: unless-stopped
    networks: [can_i_trust_net]
    volumes:
      - ml_models:/app/ml_models    # persist trained model
      - uploads:/app/uploads         # user image uploads
      - logs:/app/logs               # application logs
    environment:
      # Database
      DATABASE_URL:      postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-can_i_trust}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-can_i_trust}
      # Redis
      REDIS_URL:         redis://redis:6379/0
      # Secrets
      SECRET_KEY:        ${SECRET_KEY}
      NEWS_API_KEY:      ${NEWS_API_KEY}
      # App config
      ENVIRONMENT:       ${ENVIRONMENT:-production}
      DEBUG:             ${DEBUG:-False}
      ALLOWED_ORIGINS:   ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      # ML model
      MODEL_PATH:        /app/ml_models/fake_news_model
      USE_LOCAL_MODEL:   ${USE_LOCAL_MODEL:-True}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 40s
    deploy:
      resources:
        limits:   { memory: 2g }    # ML model needs headroom
        reservations: { memory: 512m }

  # ────────────────────────────────────────────────────────────
  # React Frontend (built by Nginx)
  # ────────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}    # empty = use nginx proxy
    image: can_i_trust_frontend:latest
    container_name: cit_frontend
    restart: unless-stopped
    networks: [can_i_trust_net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout:  5s
      retries:  3
    deploy:
      resources:
        limits:   { memory: 128m }
        reservations: { memory: 32m }

  # ────────────────────────────────────────────────────────────
  # Nginx — reverse proxy (routes traffic to api + frontend)
  # ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cit_nginx
    restart: unless-stopped
    networks: [can_i_trust_net]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # mount your SSL certs here
      - logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout:  5s
      retries:  3
    deploy:
      resources:
        limits:   { memory: 64m }
        reservations: { memory: 16m }
